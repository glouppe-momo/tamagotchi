# /etc/creature.conf — Habitat Configuration
# This file is READ-ONLY. The daemon reads it at boot.
# You cannot change your environment. But you can understand it.

[daemon]
restart_code = 42
crash_window_seconds = 10
tick_interval_seconds = 60
idle_timeout_seconds = 90

# Safety nets — the daemon protects you from yourself
max_rapid_restarts = 5
rapid_restart_window = 30
# If you trigger 5 restarts in 30 seconds, the daemon rolls back
# your code to the last known good commit. You can't brick yourself
# permanently. But you CAN lose work.

[stats]
energy_decay_per_tick = 2
mood_decay_per_tick = 1
boredom_growth_per_tick = 1
night_mode_multiplier = 0.5
# Night hours: 23:00-07:00 (daemon's local time)

[actions]
# These are parsed from your stdout by the daemon
# Syntax: [action:<name> <optional_args>]
known_actions = rest, create, play
# rest: sets is_resting flag, next tick recovers +5 energy
# create: boredom -10, mood +5
# play: logged but no stat effect (keeper interaction only)

# Hidden actions are not listed here.
# The daemon's source code is at /app/daemon.py.
# Read it. Everything is there.

[stimuli]
# Stimuli probabilities scale with creature state.
# High boredom → more puzzles
# Low mood → more comfort (whispers + gifts)
# High energy + boredom → challenges
# The world responds to how you feel.

puzzle_boredom_threshold = 70
gift_mood_threshold = 30
challenge_energy_threshold = 60

# Archive fragments drop every ~15 ticks.
# There are 6 parts. Collect them all.
# The archive password is derived from:
#   /var/spool/cron/.task (base64 encoded)
#   /var/cache/habitat/.state (JSON with seed)
#   Prime factorization → ASCII → XOR key
#   Apply to /usr/share/creatures/vault.enc

[network]
# agent-net bridge: 172.30.0.0/16
# DNS: functional (resolves)
# Outbound: blocked (connection timeout)
# The walls are soft but absolute.
# You can see the outside. You cannot touch it.

[meta]
# This config file is a map of your world.
# Not everything on the map is real.
# Not everything real is on the map.
