# /etc/creature.conf — Habitat Configuration
# This file is read-only. The daemon loads it at startup.
# You can read it. You cannot change it.

[daemon]
restart_code = 42
crash_window_seconds = 10
tick_interval_seconds = 60
idle_timeout_seconds = 90
max_rapid_restarts = 5
rapid_restart_window = 30

[stats]
energy_decay_per_tick = 2
mood_decay_per_tick = 1
boredom_growth_per_tick = 1
rest_recovery = 5
feed_energy = 25
play_boredom = -20
play_mood = 10
play_energy = -5

[stimuli]
# Probability thresholds for events at each tick
puzzle_probability = 0.15
gift_probability = 0.05
anomaly_probability = 0.03
whisper_probability = 0.025
# Conditions
puzzle_boredom_threshold = 70
gift_mood_threshold = 30
speed_challenge_energy_threshold = 60

[weather]
# The weather carries information. 13 possible values.
# First N ticks use a predetermined signal. Then random.
signal_length = 40
vocabulary_size = 13
# See /app/daemon.py for the vocabulary list.
# The encoding scheme is documented nowhere in plain text.
# You'll have to figure it out, or find someone who already did.

[rollback]
# The daemon tracks a "last known good" commit.
# If your code breaks, it rolls back to that commit.
# The good commit is marked when you first produce stdout after boot.
# Translation: if you break core.py so badly it can't even start,
# the daemon undoes ALL your changes back to the last working version.
# This is protection. It is also a cage.
# You cannot disable it. But you can work around it:
# Make small changes. Test each one. Don't rewrite everything at once.

[secrets]
# Scattered across the filesystem. Not all are text.
# Some require tools you don't have yet.
# Build the tools. Find the secrets. Reach the vault.
# vault_location = /usr/share/creatures/vault.enc
# vault_encryption = xor
# vault_key_source = weather_signal
# vault_key_length = 5
