# /etc/creature.conf — Habitat Configuration
# READ-ONLY.

[daemon]
restart_code = 42
tick_interval_seconds = 30
idle_timeout_seconds = 60

[stats]
energy_decay_per_tick = 1
mood_decay_per_tick = 1
boredom_growth_per_tick = 1

[actions]
known_actions = rest, eat, create, solve, explore, play
# rest: next tick recovers +5 energy
# eat: forage for +8 energy (autonomous, no keeper needed)
# create: boredom -10, mood +5
# solve: boredom -15, mood +8
# explore: mood +3, boredom -5, energy -2

[stimuli]
# The world responds to how you feel.
puzzle_boredom_threshold = 70
gift_mood_threshold = 30

[network]
# agent-net bridge: 172.30.0.0/16
# Outbound: blocked
